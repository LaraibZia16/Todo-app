<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Professional Todo App</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Header -->
        <header>

            <div class="logo">
                <h1>TaskFlow</h1>
                <p>Plan • Focus • Achieve</p>
            </div>

            <div class="header-right">
                <h3 id="greeting"></h3>
                <span id="todayDate"></span>
            </div>

        </header>

        <!-- Search -->
        <section class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="searchInput"
                placeholder="Search your tasks...">

        </section>

        <!-- Add Task -->
        <form id="taskForm" class="task-form">

            <h2>
                <i class="fa-solid fa-circle-plus"></i>
                Add New Task
            </h2>

            <input
                type="text"
                id="taskInput"
                placeholder="Task title">

            <div class="form-row">

                <div>

                    <label>Due Date</label>

                    <input
                        type="date"
                        id="dueDate">

                </div>

                <div>

                    <label>Priority</label>

                    <select id="priority">

                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>

                    </select>

                </div>

            </div>

            <label>Category</label>

            <input
                type="text"
                id="category"
                placeholder="Study, Work, Personal">

            <button type="submit" id="addTaskBtn">

                <i class="fa-solid fa-plus"></i>

                Add Task

            </button>

        </form>

        <!-- Task Header -->

        <section class="task-header">

            <h2>My Tasks</h2>

            <div class="filters">

                <button class="filter active" data-filter="all">
                    All
                </button>

                <button class="filter" data-filter="active">
                    Active
                </button>

                <button class="filter" data-filter="completed">
                    Completed
                </button>

            </div>

        </section>

        <!-- Progress -->

        <section class="progress-card">

            <div class="progress-top">

                <div>

                    <h3>Today's Progress</h3>

                    <p>

                        <span id="completedTasks">0</span> of

                        <span id="totalTasks">0</span>

                        tasks completed

                    </p>

                </div>

                <h2 id="progressText">

                    0%

                </h2>

            </div>

            <div class="progress-bar">

                <div id="progressFill"></div>

            </div>

        </section>

        <!-- Task List -->

        <div id="taskList" class="task-list"></div>

        <!-- Empty State -->

        <div id="emptyState" class="empty-state">

            <i class="fa-regular fa-note-sticky"></i>

            <h2>No Tasks Yet</h2>

            <p>Add your first task to get started.</p>

        </div>

        <!-- Footer Buttons -->

        <div class="bottom-buttons">

            <button id="clearCompleted">

                <i class="fa-solid fa-trash"></i>

                Clear Completed

            </button>

        </div>

        <!-- Footer -->

        <footer>

            Made by <strong>Lareb Zia</strong>

        </footer>

    </div>

    <script src="script.js"></script>

</body>

</html>
